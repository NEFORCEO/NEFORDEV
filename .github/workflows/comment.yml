name: PR Comment

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const pr = context.payload.pull_request;
            const buildUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            const commentBody = `🚀 **Pull Request #${prNumber}**\n\n` +
              `**Status:** ${pr.state === 'open' ? '🟢 Open' : '🔴 Closed'}\n` +
              `**Branch:** ${pr.head.ref} → ${pr.base.ref}\n\n` +
              `🔗 [View Build](${buildUrl})`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
