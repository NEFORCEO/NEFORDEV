name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install ESLint
        run: npm install -g eslint@8
      
      - name: Run ESLint
        run: |
          npm install eslint@8 --save-dev
          npx eslint js/*.js
